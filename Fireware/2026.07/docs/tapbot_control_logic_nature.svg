<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050">
  <defs>
    <style>
      .title{font:700 30px Arial,sans-serif;fill:#17202A}.panel{font:700 26px Arial,sans-serif;fill:#17202A}
      .h{font:700 20px Arial,sans-serif;fill:#17202A}.t{font:16px Arial,sans-serif;fill:#25313C}.s{font:14px Arial,sans-serif;fill:#45525E}
      .box{stroke:#38454F;stroke-width:1.7;rx:12}.arrow{stroke:#38454F;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#D1495B;stroke-width:2;stroke-dasharray:8 6;fill:none;marker-end:url(#redarrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#38454F"/></marker>
    <marker id="redarrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#D1495B"/></marker>
  </defs>
  <rect width="1600" height="1050" fill="#FFFFFF"/>
  <text x="70" y="55" class="title">TapBot control architecture and autonomous workflow</text>

  <text x="55" y="108" class="panel">a</text>
  <text x="95" y="108" class="h">Control architecture</text>

  <rect x="80" y="150" width="220" height="92" class="box" fill="#EAF1F8"/>
  <text x="190" y="184" text-anchor="middle" class="h">Remote controller</text><text x="190" y="214" text-anchor="middle" class="s">USART3 · CBUS · 45 B</text>
  <rect x="80" y="278" width="220" height="92" class="box" fill="#EAF1F8"/>
  <text x="190" y="312" text-anchor="middle" class="h">Upper computer</text><text x="190" y="342" text-anchor="middle" class="s">USART2 · A5 + CRC16</text>

  <rect x="390" y="176" width="255" height="168" class="box" fill="#F5F7F9"/>
  <text x="518" y="211" text-anchor="middle" class="h">STM32F107 main board</text>
  <text x="518" y="244" text-anchor="middle" class="t">Protocol parsers</text><text x="518" y="272" text-anchor="middle" class="t">Control-source arbiter</text>
  <text x="518" y="300" text-anchor="middle" class="s">RMT fallback / UP watchdog</text><text x="518" y="326" text-anchor="middle" class="s">10-ms nominal scheduler</text>
  <path d="M300 196 H390" class="arrow"/><path d="M300 324 H390" class="arrow"/>

  <rect x="735" y="112" width="215" height="78" class="box" fill="#E8F5F2"/><text x="842" y="143" text-anchor="middle" class="h">M8010 actuator</text><text x="842" y="169" text-anchor="middle" class="s">30 ms · speed / length PID</text>
  <rect x="735" y="214" width="215" height="78" class="box" fill="#E8F5F2"/><text x="842" y="245" text-anchor="middle" class="h">PTZ gimbal</text><text x="842" y="271" text-anchor="middle" class="s">50 ms · speed / IMU angle</text>
  <rect x="735" y="316" width="215" height="78" class="box" fill="#E8F5F2"/><text x="842" y="347" text-anchor="middle" class="h">CAN feedback</text><text x="842" y="373" text-anchor="middle" class="s">Encoder + Wit IMU</text>
  <path d="M645 218 C690 218 690 151 735 151" class="arrow"/><path d="M645 260 H735" class="arrow"/><path d="M735 355 C690 355 690 304 645 304" class="arrow"/>

  <rect x="1035" y="176" width="245" height="168" class="box" fill="#FFF4DE"/>
  <text x="1158" y="211" text-anchor="middle" class="h">STM32F103 sub-board</text>
  <text x="1158" y="244" text-anchor="middle" class="t">A6 + CRC16 parser</text><text x="1158" y="272" text-anchor="middle" class="t">Manual / auto state machine</text>
  <text x="1158" y="300" text-anchor="middle" class="s">Photoelectric sensor</text><text x="1158" y="326" text-anchor="middle" class="s">RS485 · heartbeat/state</text>
  <path d="M645 260 H1035" class="arrow"/>

  <rect x="1365" y="130" width="175" height="78" class="box" fill="#FBEAEC"/><text x="1452" y="161" text-anchor="middle" class="h">Servo ID0–2</text><text x="1452" y="187" text-anchor="middle" class="s">speed / position</text>
  <rect x="1365" y="234" width="175" height="78" class="box" fill="#FBEAEC"/><text x="1452" y="265" text-anchor="middle" class="h">Servo ID3</text><text x="1452" y="291" text-anchor="middle" class="s">auto rotation</text>
  <rect x="1365" y="338" width="175" height="78" class="box" fill="#FBEAEC"/><text x="1452" y="369" text-anchor="middle" class="h">Pushrod</text><text x="1452" y="395" text-anchor="middle" class="s">extend / retract</text>
  <path d="M1280 218 C1322 218 1322 169 1365 169" class="arrow"/><path d="M1280 260 H1365" class="arrow"/><path d="M1280 302 C1322 302 1322 377 1365 377" class="arrow"/>

  <rect x="80" y="435" width="1460" height="72" rx="10" fill="#FFF7F7" stroke="#D1495B" stroke-width="1.6"/>
  <text x="105" y="465" class="h" fill="#B33C4A">Safety-critical review points</text>
  <text x="105" y="491" class="t">50-s remote timeout · stale encoder/IMU validity · no sub-board link watchdog · USART1 shared by RS485 and Feetech traffic</text>
  <path d="M1195 435 C1195 395 1160 385 1160 344" class="dash"/>

  <text x="55" y="575" class="panel">b</text>
  <text x="95" y="575" class="h">Autonomous workflow (upper computer → main board → end effector)</text>

  <rect x="85" y="625" width="180" height="78" class="box" fill="#EAF1F8"/><text x="175" y="657" text-anchor="middle" class="h">AUTO_START</text><text x="175" y="683" text-anchor="middle" class="s">32-byte configuration</text>
  <rect x="325" y="625" width="210" height="78" class="box" fill="#E8F5F2"/><text x="430" y="657" text-anchor="middle" class="h">Move to target</text><text x="430" y="683" text-anchor="middle" class="s">PTZ · M8010 · servo 0–2</text>
  <rect x="595" y="625" width="210" height="78" class="box" fill="#E8F5F2"/><text x="700" y="657" text-anchor="middle" class="h">Wait for arm</text><text x="700" y="683" text-anchor="middle" class="s">encoder · tolerance · 12 s</text>
  <rect x="865" y="625" width="210" height="78" class="box" fill="#FFF4DE"/><text x="970" y="657" text-anchor="middle" class="h">Start sub-board</text><text x="970" y="683" text-anchor="middle" class="s">online check · AUTO_START</text>
  <rect x="1135" y="625" width="210" height="78" class="box" fill="#FFF4DE"/><text x="1240" y="657" text-anchor="middle" class="h">End-effector auto</text><text x="1240" y="683" text-anchor="middle" class="s">sensor · ID3 · pushrod</text>
  <path d="M265 664 H325" class="arrow"/><path d="M535 664 H595" class="arrow"/><path d="M805 664 H865" class="arrow"/><path d="M1075 664 H1135" class="arrow"/>

  <rect x="1135" y="778" width="210" height="78" class="box" fill="#E8F5F2"/><text x="1240" y="810" text-anchor="middle" class="h">Retract (optional)</text><text x="1240" y="836" text-anchor="middle" class="s">servo 0–2 + M8010</text>
  <rect x="865" y="778" width="210" height="78" class="box" fill="#E8F5F2"/><text x="970" y="810" text-anchor="middle" class="h">Done</text><text x="970" y="836" text-anchor="middle" class="s">terminal state</text>
  <path d="M1240 703 V778" class="arrow"/><path d="M1135 817 H1075" class="arrow"/>

  <rect x="325" y="778" width="480" height="78" rx="12" fill="#FFF0F2" stroke="#D1495B" stroke-width="1.7"/>
  <text x="565" y="810" text-anchor="middle" class="h" fill="#B33C4A">Error / abort</text><text x="565" y="836" text-anchor="middle" class="s">PTZ + sub-board stop; M8010 target is currently not cancelled</text>
  <path d="M700 703 V778" class="dash"/><path d="M970 703 C970 750 805 750 805 817" class="dash"/>

  <rect x="85" y="918" width="1460" height="82" rx="10" fill="#F7F8FA" stroke="#B9C1C8" stroke-width="1.2"/>
  <text x="110" y="948" class="h">Sub-board sequence</text>
  <text x="110" y="978" class="t">WAIT_OBJECT → PUSHROD_EXTEND → PRESS_HOLD → SERVO_FORWARD → SERVO_REVERSE → PUSHROD_RETRACT → DONE → IDLE</text>
  <text x="1535" y="1025" text-anchor="end" class="s">Vector schematic · restrained palette · panelled publication layout</text>
</svg>
